services:
  pi-mobile-server:
    build: .
    container_name: pi-mobile-server
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      APP_PASSWORD: ${APP_PASSWORD}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      GIT_USER_NAME: ${GIT_USER_NAME:-}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
      WORKSPACE_ROOT: /workspace
      COSTS_DB_PATH: ${COSTS_DB_PATH:-/workspace/pi-mobile/.pi-mobile/costs.sqlite}
      LOGS_DIR: ${LOGS_DIR:-/workspace/pi-mobile/.pi-mobile/logs}
      DEFAULT_REPO: ${DEFAULT_REPO:-}
      PI_AGENT_DIR: /home/node/.pi/agent
      PI_SESSION_DIR: ${PI_SESSION_DIR:-/workspace/pi-mobile/.pi-mobile/sessions}
      PI_PROVIDER: ${PI_PROVIDER:-}
      PI_MODEL: ${PI_MODEL:-}
      PI_THINKING_LEVEL: ${PI_THINKING_LEVEL:-}
    volumes:
      - ${WORKSPACE_HOST_PATH}:/workspace
      - ${PI_HOME_HOST_PATH}:/home/node/.pi
      - ${GITCONFIG_HOST_PATH}:/home/node/.gitconfig:ro
      - ${SSH_HOST_PATH}:/home/node/.ssh:ro
